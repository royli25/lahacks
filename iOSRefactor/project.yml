name: AmiyaHealthiOS

packages:
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift.git
    from: 2.0.0

options:
  bundleIdPrefix: com.amiya
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    PRODUCT_NAME: AmiyaHealthiOS
    PRODUCT_BUNDLE_IDENTIFIER: com.amiya.health.ios
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    INFOPLIST_FILE: Resources/Info.plist
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  AmiyaHealthiOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    dependencies:
      - package: LiveKit
        product: LiveKit
  AmiyaHealthiOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: AmiyaHealthiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amiya.health.ios.tests
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_MODULE_NAME: AmiyaHealthiOSTests

schemes:
  AmiyaHealthiOS:
    build:
      targets:
        AmiyaHealthiOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: AmiyaHealthiOSTests
    archive:
      config: Release
