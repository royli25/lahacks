name: AmiyaHealthiOS

packages:
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift.git
    exactVersion: 2.12.1

options:
  bundleIdPrefix: com.amiya
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    PRODUCT_NAME: AmiyaHealthiOS
    PRODUCT_BUNDLE_IDENTIFIER: com.amiya.health.ios
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    INFOPLIST_FILE: Resources/Info.plist
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  AmiyaHealthiOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    dependencies:
      - package: LiveKit
        product: LiveKit

schemes:
  AmiyaHealthiOS:
    build:
      targets:
        AmiyaHealthiOS: all
    run:
      config: Debug
    archive:
      config: Release
